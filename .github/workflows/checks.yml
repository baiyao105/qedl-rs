name: Checks

on:
  workflow_call:
    inputs:
      is_release:
        required: false
        type: boolean
        default: false
    outputs:
      check_passed:
        description: "Whether all checks passed"
        value: ${{ jobs.checks.outputs.check_passed }}
      skip_checks:
        description: "Whether to skip checks for release"
        value: ${{ jobs.checks.outputs.skip_checks }}

jobs:
  checks:
    runs-on: ubuntu-latest
    outputs:
      check_passed: ${{ steps.aggregate.outputs.check_passed }}
      skip_checks: ${{ steps.skip_checks.outputs.skip_checks }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for skip-checks
        id: skip_checks
        shell: bash
        run: |
          if [[ '${{ inputs.is_release }}' != 'true' ]]; then
            echo "skip_checks=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qi "skip-checks"; then
            echo "skip_checks=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_checks=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt
        id: fmt
        run: cargo fmt --all --check
        continue-on-error: true

      - name: cargo clippy
        id: clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true

      - name: cargo test
        id: test
        run: cargo test --all
        continue-on-error: true

      - name: Aggregate result
        id: aggregate
        shell: bash
        run: |
          if [[ '${{ steps.fmt.outcome }}' == 'success' && \
                '${{ steps.clippy.outcome }}' == 'success' && \
                '${{ steps.test.outcome }}' == 'success' ]]; then
            echo "check_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "check_passed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if checks failed
        if: steps.aggregate.outputs.check_passed != 'true'
        run: exit 1

name: Checks

on:
  workflow_call:
    inputs:
      is_release:
        required: false
        type: boolean
        default: false
    outputs:
      check_passed:
        description: "Whether all checks passed"
        value: ${{ jobs.checks.outputs.check_passed }}
      skip_checks:
        description: "Whether to skip checks for release"
        value: ${{ jobs.checks.outputs.skip_checks }}

jobs:
  checks:
    runs-on: windows-latest
    permissions:
      contents: read
    outputs:
      check_passed: ${{ steps.aggregate.outputs.check_passed }}
      skip_checks: ${{ steps.skip_checks.outputs.skip_checks }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for skip-checks
        id: skip_checks
        shell: bash
        run: |
          if [[ '${{ inputs.is_release }}' != 'true' ]]; then
            echo "skip_checks=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qi "skip-checks"; then
            echo "skip_checks=true" >> "$GITHUB_OUTPUT"
            echo "### Skip checks found in commit message" >> "$GITHUB_STEP_SUMMARY"
            ::group::skip_checks
            echo "[DEBUG] Commit message: $COMMIT_MSG"
            ::endgroup::
          else
            echo "skip_checks=false" >> "$GITHUB_OUTPUT"
            ::group::skip_checks
            echo "[DEBUG] Commit message: $COMMIT_MSG"
            ::endgroup::
            echo "### No skip-checks found in commit message" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt
        id: fmt
        run: cargo fmt --all --check
        continue-on-error: true

      - name: cargo clippy
        id: clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true

      - name: cargo test
        id: test
        run: cargo test --all
        continue-on-error: true

      - name: Aggregate result
        id: aggregate
        if: always()
        shell: bash
        run: |
          FMT_OUTCOME="${{ steps.fmt.outcome }}"
          CLIPPY_OUTCOME="${{ steps.clippy.outcome }}"
          TEST_OUTCOME="${{ steps.test.outcome }}"
          if [ "$FMT_OUTCOME" = "success" ] && [ "$CLIPPY_OUTCOME" = "success" ] && [ "$TEST_OUTCOME" = "success" ]; then
            echo "check_passed=true" >> "$GITHUB_OUTPUT"
            echo "### All checks passed" >> "$GITHUB_STEP_SUMMARY"
            echo "- fmt: $FMT_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
            echo "- clippy: $CLIPPY_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
            echo "- test: $TEST_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "check_passed=false" >> "$GITHUB_OUTPUT"
            echo "### Some checks failed" >> "$GITHUB_STEP_SUMMARY"
            echo "- fmt: $FMT_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
            echo "- clippy: $CLIPPY_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
            echo "- test: $TEST_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

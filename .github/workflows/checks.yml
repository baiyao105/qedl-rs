name: Checks

on:
  workflow_call:
    inputs:
      is_release:
        required: false
        type: boolean
        default: false
    outputs:
      check_passed:
        description: "Whether all checks passed"
        value: ${{ jobs.aggregate.outputs.check_passed }}
      skip_checks:
        description: "Whether to skip checks for release"
        value: ${{ jobs.skip-checks.outputs.skip_checks }}

jobs:
  skip-checks:
    runs-on: ubuntu-latest
    outputs:
      skip_checks: ${{ steps.check.outputs.skip_checks }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for skip-checks
        id: check
        shell: bash
        run: |
          if [[ '${{ inputs.is_release }}' != 'true' ]]; then
            echo "skip_checks=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qi "skip-checks"; then
            echo "skip_checks=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_checks=false" >> "$GITHUB_OUTPUT"
          fi

  fmt:
    runs-on: ubuntu-latest
    needs: skip-checks
    if: needs.skip-checks.outputs.skip_checks != 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    needs: skip-checks
    if: needs.skip-checks.outputs.skip_checks != 'true'
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    needs: skip-checks
    if: needs.skip-checks.outputs.skip_checks != 'true'
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --all

  msrv:
    runs-on: ubuntu-latest
    needs: skip-checks
    if: needs.skip-checks.outputs.skip_checks != 'true'
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-hack
      - run: cargo hack check --workspace --feature-powerset --exclude-features default

  aggregate:
    runs-on: ubuntu-latest
    if: always()
    needs: [fmt, clippy, test, msrv]
    outputs:
      check_passed: ${{ steps.result.outputs.check_passed }}
    steps:
      - name: Aggregate results
        id: result
        shell: bash
        run: |
          echo "fmt: ${{ needs.fmt.result }}"
          echo "clippy: ${{ needs.clippy.result }}"
          echo "test: ${{ needs.test.result }}"
          echo "msrv: ${{ needs.msrv.result }}"
          if [ "${{ needs.fmt.result }}" = "success" ] && \
             [ "${{ needs.clippy.result }}" = "success" ] && \
             [ "${{ needs.test.result }}" = "success" ] && \
             [ "${{ needs.msrv.result }}" = "success" ]; then
            echo "check_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "check_passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
